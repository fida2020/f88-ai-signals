<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F88 Admin Panel</title>
<link rel="stylesheet" href="style.css">
<style>
.admin{width:90%;margin:20px auto;background:#1a1a1a;border:2px solid gold;border-radius:20px;padding:20px;}
.admin h2{text-align:center;color:gold;margin-bottom:20px;}
input,select{width:100%;padding:15px;margin:10px 0;background:#2a2a2a;color:white;border:1px solid gold;border-radius:10px;font-size:18px;box-sizing:border-box;}
button{width:100%;padding:15px;margin-top:15px;background:gold;color:black;font-size:20px;font-weight:bold;border:none;border-radius:10px;cursor:pointer;}
button:active{transform:scale(.98);}
#msg{text-align:center;margin-top:15px;font-size:18px;font-weight:bold;}
</style>
</head>
<body>

<div class="header">
<h1>👨‍💼 Admin Panel</h1>
<p>Create New Signal</p>
</div>

<div class="admin">
<h2>New Trading Signal</h2>

<select id="pair">
<option>BTC/USD</option>
<option>XAU/USD (Gold)</option>
<option>EUR/USD</option>
<option>ETH/USD</option>
<option>SOL/USD</option>
</select>

<select id="direction">
<option>🟢 BUY</option>
<option>🔴 SELL</option>
</select>

<input type="number" id="entry" placeholder="Entry Price">
<input type="number" id="sl" placeholder="Stop Loss">
<input type="number" id="tp1" placeholder="Take Profit 1">
<input type="number" id="tp2" placeholder="Take Profit 2">
<input type="number" id="tp3" placeholder="Take Profit 3">
<input type="text" id="confidence" placeholder="AI Confidence (90%)">

<button onclick="saveSignal()">💾 Save Signal</button>
<p id="msg"></p>
</div>

<div class="bottom">
<a href="index.html">🏠<br>Home</a>
<a href="history.html">📊<br>History</a>
<a href="vip.html">👑<br>VIP</a>
<a href="profile.html">👤<br>Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB93-AOcHZMz7_dYP_yRaDFGXi9iQ6Wxis",
  authDomain: "f88-ai-signals.firebaseapp.com",
  projectId: "f88-ai-signals",
  storageBucket: "f88-ai-signals.firebasestorage.app",
  messagingSenderId: "345283236517",
  appId: "1:345283236517:web:a5d4d7b8f98ba99b2ef34c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveSignal = async function() {
  const pair = document.getElementById("direction").value + " - " + document.getElementById("pair").value;
  const entry = document.getElementById("entry").value;
  const sl = document.getElementById("sl").value;
  const tp1 = document.getElementById("tp1").value;
  const tp2 = document.getElementById("tp2").value;
  const tp3 = document.getElementById("tp3").value;
  const confidence = document.getElementById("confidence").value;
  const msg = document.getElementById("msg");

  if(!entry || !sl || !tp1) {
    msg.style.color = "red";
    msg.innerText = "❌ Entry, SL aur TP1 zaroor bharein!";
    return;
  }

  try {
    msg.style.color = "yellow";
    msg.innerText = "⏳ Saving...";

    await addDoc(collection(db, "signals"), {
      pair, entry: Number(entry), sl: Number(sl),
      tp1: Number(tp1), tp2: Number(tp2), tp3: Number(tp3),
      confidence, trend: pair.includes("BUY") ? "Bullish" : "Bearish",
      timestamp: new Date().toISOString()
    });

    msg.style.color = "#00c853";
    msg.innerText = "✅ Signal saved to database!";

    document.getElementById("entry").value = "";
    document.getElementById("sl").value = "";
    document.getElementById("tp1").value = "";
    document.getElementById("tp2").value = "";
    document.getElementById("tp3").value = "";
    document.getElementById("confidence").value = "";

  } catch(e) {
    msg.style.color = "red";
    msg.innerText = "❌ Error: " + e.message;
  }
}
</script>

</body>
</html>
