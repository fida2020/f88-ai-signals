<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F88 Admin Panel</title>
<link rel="stylesheet" href="style.css">
<style>
label { display:block; font-size:12px; color:#5a7099; margin:10px 0 3px; text-transform:uppercase; letter-spacing:1px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
#msg { text-align:center; margin-top:15px; font-size:15px; font-weight:bold; padding:10px; border-radius:8px; }
.save-btn { background:linear-gradient(135deg,#c9a227,#a07820); color:#000; font-size:18px; font-weight:800; border:none; border-radius:12px; padding:16px; width:100%; margin-top:15px; cursor:pointer; }
.admin-title { text-align:center; color:#c9a227; margin-bottom:20px; }
.admin-title h2 { font-size:20px; }
.admin-title p { font-size:12px; color:#5a7099; margin-top:4px; }
</style>
</head>
<body>

<div class="header">
  <h1>👨‍💼 Admin Panel</h1>
  <p>F88 Signal Management</p>
</div>

<div class="admin">
  <div class="admin-title">
    <h2>📡 Post New Signal</h2>
    <p>Signal will go live instantly for all users</p>
  </div>

  <label>Trading Pair</label>
  <select id="pair">
    <option>BTC/USD</option>
    <option>XAU/USD (Gold)</option>
    <option>EUR/USD</option>
    <option>GBP/USD</option>
    <option>ETH/USD</option>
    <option>SOL/USD</option>
  </select>

  <label>Signal Direction</label>
  <select id="direction">
    <option>🟢 BUY</option>
    <option>🔴 SELL</option>
  </select>

  <label>Entry Price</label>
  <input type="number" id="entry" placeholder="e.g. 3320">

  <label>Stop Loss</label>
  <input type="number" id="sl" placeholder="e.g. 3305">

  <div class="row2">
    <div>
      <label>Take Profit 1</label>
      <input type="number" id="tp1" placeholder="TP1">
    </div>
    <div>
      <label>Take Profit 2</label>
      <input type="number" id="tp2" placeholder="TP2">
    </div>
  </div>

  <label>Take Profit 3</label>
  <input type="number" id="tp3" placeholder="TP3 Aggressive">

  <label>AI Confidence</label>
  <input type="text" id="confidence" placeholder="e.g. 88%">

  <button class="save-btn" onclick="saveSignal()">💾 PUBLISH SIGNAL</button>
  <p id="msg"></p>
</div>

<div class="bottom">
  <a href="index.html"><span>🏠</span>Home</a>
  <a href="history.html"><span>📊</span>History</a>
  <a href="vip.html"><span>👑</span>VIP</a>
  <a href="profile.html"><span>👤</span>Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB93-AOcHZMz7_dYP_yRaDFGXi9iQ6Wxis",
  authDomain: "f88-ai-signals.firebaseapp.com",
  projectId: "f88-ai-signals",
  storageBucket: "f88-ai-signals.firebasestorage.app",
  messagingSenderId: "345283236517",
  appId: "1:345283236517:web:a5d4d7b8f98ba99b2ef34c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveSignal = async function() {
  const pair = document.getElementById("direction").value + " - " + document.getElementById("pair").value;
  const entry = document.getElementById("entry").value;
  const sl = document.getElementById("sl").value;
  const tp1 = document.getElementById("tp1").value;
  const tp2 = document.getElementById("tp2").value;
  const tp3 = document.getElementById("tp3").value;
  const confidence = document.getElementById("confidence").value || "85%";
  const msg = document.getElementById("msg");

  if(!entry || !sl || !tp1) {
    msg.style.color = "#ff4444";
    msg.style.background = "rgba(255,68,68,0.1)";
    msg.innerText = "❌ Entry, SL aur TP1 zaroor bharein!";
    return;
  }

  try {
    msg.style.color = "#c9a227";
    msg.style.background = "rgba(201,162,39,0.1)";
    msg.innerText = "⏳ Publishing...";

    await addDoc(collection(db, "signals"), {
      pair, entry: Number(entry), sl: Number(sl),
      tp1: Number(tp1), tp2: Number(tp2), tp3: Number(tp3),
      confidence, trend: pair.includes("BUY") ? "Bullish" : "Bearish",
      timestamp: new Date().toISOString()
    });

    msg.style.color = "#00c853";
    msg.style.background = "rgba(0,200,83,0.1)";
    msg.innerText = "✅ Signal published!";

    ["entry","sl","tp1","tp2","tp3","confidence"].forEach(id => {
      document.getElementById(id).value = "";
    });

  } catch(e) {
    msg.style.color = "#ff4444";
    msg.innerText = "❌ Error: " + e.message;
  }
}
</script>

</body>
</html>
